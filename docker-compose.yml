version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: tasksphere-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tasksphere
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: tasksphere-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit-data:/data

  prisma-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    container_name: tasksphere-prisma-migrate
    environment:
      DATABASE_URL: mysql://root:rootpassword@db:3306/tasksphere
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  db-data:
  mailpit-data:
