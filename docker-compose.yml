services:
  db:
    image: mysql:8.0
    container_name: tasksphere-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tasksphere
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: tasksphere-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit-data:/data

  prisma-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    container_name: tasksphere-prisma-migrate
    environment:
      DATABASE_URL: mysql://root:rootpassword@db:3306/tasksphere
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  rag-notes:
    build:
      context: ../rag-notes/backend
    container_name: tasksphere-rag-notes
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      DISTANCE_THRESHOLD: ${DISTANCE_THRESHOLD:-0.7}
      NOTES_DIR: /app/notes
    volumes:
      - rag-chroma-data:/app/chroma_db
      - rag-notes-data:/app/notes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  backend:
    build:
      context: ./backend
    container_name: tasksphere-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: mysql://root:rootpassword@db:3306/tasksphere
      JWT_SECRET: ${JWT_SECRET:-changeme-in-production}
      RAG_SERVICE_URL: http://rag-notes:8000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      rag-notes:
        condition: service_healthy

volumes:
  db-data:
  mailpit-data:
  rag-chroma-data:
  rag-notes-data:
  backend-uploads:
