<div class="min-h-screen flex flex-col bg-brand-bg">
  <!-- Top bar -->
  <header class="h-14 bg-brand-primary text-slate-50 flex items-center justify-between px-6 shadow-md">

    <div class="flex items-center gap-2">
      <span class="font-semibold tracking-wide text-lg">TaskSphere</span>
    </div>

    <nav class="flex items-center gap-4 text-sm">
      <!-- You already have auth service injected, reuse it -->
      <ng-container *ngIf="isLoggedIn(); else authLinks">
        <a mat-button routerLink="/profile">Profile</a>
        <a mat-button routerLink="/tasks">Tasks</a>
        <button class="hover:text-white/80 transition-colors" (click)="logout()">Logout</button>
      </ng-container>


      <ng-template #authLinks>
        <a routerLink="/auth/login" class="hover:text-white/80">Login</a>
        <a routerLink="/auth/register" class="hover:text-white/80">Register</a>
      </ng-template>
    </nav>
  </header>

  <!-- Content -->
  <main class="flex-1 px-4 py-8 md:px-8">
    <router-outlet></router-outlet>
  </main>
</div>
