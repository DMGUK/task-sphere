<div class="p-4 md:p-6 w-full" style="min-width: 400px">
  <h2 class="text-lg font-semibold text-slate-900 mb-4">
    {{ data.mode === 'edit' ? 'Edit note' : 'New note' }}
  </h2>

  <form [formGroup]="form" class="space-y-4">

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Title*</mat-label>
      <input matInput formControlName="title" />
      <mat-error *ngIf="form.get('title')?.hasError('required')">Title is required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Content</mat-label>
      <textarea matInput formControlName="content" rows="6" style="resize: vertical"></textarea>
    </mat-form-field>

    <!-- Color picker -->
    <div>
      <p class="text-sm text-slate-500 mb-2">Color</p>
      <div class="color-swatches">
        @for (c of colors; track c.value) {
          <button
            type="button"
            class="color-swatch"
            [style.background]="c.value"
            [class.selected]="form.value.color === c.value"
            (click)="selectColor(c.value)"
            [title]="c.label">
          </button>
        }
      </div>
    </div>

    <div class="flex justify-end gap-2 pt-2">
      <button mat-button type="button" (click)="cancel()">Cancel</button>
      <button mat-raised-button color="primary" type="button" [disabled]="form.invalid" (click)="save()">
        {{ data.mode === 'edit' ? 'Save' : 'Create' }}
      </button>
    </div>

  </form>
</div>
