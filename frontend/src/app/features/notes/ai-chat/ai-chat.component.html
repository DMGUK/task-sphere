<button
  mat-fab
  class="ai-fab"
  color="primary"
  matTooltip="Ask AI about your notes"
  matTooltipPosition="left"
  (click)="toggle()">
  <mat-icon>smart_toy</mat-icon>
</button>

@if (isOpen()) {
  <div class="ai-panel">
    <div class="ai-panel-header">
      <span>Ask AI about your notes</span>
      <button mat-icon-button (click)="toggle()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="ai-messages" #messagesEl>
      @if (messages().length === 0) {
        <p class="ai-empty">
          Ask anything about your notes — "summarise my notes", "what tasks did I mention?"
        </p>
      }
      @for (msg of messages(); track $index) {
        <div class="ai-msg" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
          <div class="ai-bubble" [class.streaming]="msg.streaming">{{ msg.text }}</div>
        </div>
      }
    </div>

    <div class="ai-input-bar">
      <textarea
        [(ngModel)]="question"
        (keydown)="handleKeydown($event)"
        (input)="autoResize($event)"
        placeholder="Ask about your notes…"
        rows="1"
        [disabled]="sending()">
      </textarea>
      <button
        mat-icon-button
        color="primary"
        (click)="send()"
        [disabled]="sending() || !question.trim()">
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </div>
}
