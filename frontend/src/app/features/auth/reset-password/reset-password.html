<div class="flex items-center justify-center min-h-[calc(100vh-3.5rem)]">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-4">
    <h2 class="text-xl font-semibold text-slate-800">Reset Password</h2>

    @if (done) {
      <div class="rounded-lg bg-green-50 border border-green-200 p-4 text-green-800 text-sm">
        Password reset successfully!
      </div>
      <p class="text-sm text-slate-500">
        <a routerLink="/auth/login" class="text-blue-600 hover:underline">Log in with your new password</a>
      </p>
    } @else {
      <form (ngSubmit)="submit()" class="space-y-4">
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>New Password</mat-label>
          <input matInput [(ngModel)]="password" name="password" type="password" required minlength="6" />
        </mat-form-field>

        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Confirm Password</mat-label>
          <input matInput [(ngModel)]="confirm" name="confirm" type="password" required />
        </mat-form-field>

        <button mat-raised-button color="primary" class="w-full" type="submit" [disabled]="loading">
          {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
      </form>
    }
  </div>
</div>
