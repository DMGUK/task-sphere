<div class="flex items-center justify-center min-h-[calc(100vh-3.5rem)]">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-6 space-y-4">
    <h2 class="text-xl font-semibold text-slate-800">Forgot Password</h2>

    @if (submitted) {
      <div class="rounded-lg bg-green-50 border border-green-200 p-4 text-green-800 text-sm">
        Check your inbox — if that email exists we've sent a reset link.
      </div>
      <p class="text-sm text-slate-500">
        <a routerLink="/auth/login" class="text-blue-600 hover:underline">Back to Login</a>
      </p>
    } @else {
      <p class="text-sm text-slate-500">Enter your email and we'll send you a link to reset your password.</p>

      <form (ngSubmit)="submit()" class="space-y-4">
        <mat-form-field appearance="fill" class="w-full">
          <mat-label>Email</mat-label>
          <input matInput [(ngModel)]="email" name="email" type="email" required />
        </mat-form-field>

        <button mat-raised-button color="primary" class="w-full" type="submit" [disabled]="loading">
          {{ loading ? 'Sending...' : 'Send Reset Link' }}
        </button>
      </form>

      <p class="text-sm text-slate-500">
        <a routerLink="/auth/login" class="text-blue-600 hover:underline">Back to Login</a>
      </p>
    }
  </div>
</div>
